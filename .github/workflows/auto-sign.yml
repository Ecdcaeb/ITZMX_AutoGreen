name: 每日签到 & 红包

on:
  schedule:
    - cron: '0 16 * * *'   # 北京时间 0:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: 执行签到 & 红包
        env:
          ITZMX_COOKIE: ${{ secrets.ITZMX_COOKIE }}
        run: python auto_sign.py
